  <path d="M154 80 C182 68 196 42 190 18 C172 34 160 42 146 60 C140 68 142 76 154 80 Z"
        fill="url(#horn)" stroke="#3A2A5E" stroke-width="2.5" stroke-linejoin="round"/>

  <!-- face / mask -->
  <path d="M120 64 C170 64 204 96 204 136 C204 180 168 212 120 220 C72 212 36 180 36 136 C36 96 70 64 120 64 Z"
        fill="url(#face)" stroke="#2E2050" stroke-width="3.5" stroke-linejoin="round"/>

  <!-- angry brows -->
  <path d="M60 116 L114 136 L106 150 L62 132 Z" fill="#241640"/>
  <path d="M180 116 L126 136 L134 150 L178 132 Z" fill="#241640"/>

  <!-- glowing eyes -->
  <ellipse cx="88" cy="152" rx="17" ry="12.5" fill="url(#eye)"/>
  <ellipse cx="152" cy="152" rx="17" ry="12.5" fill="url(#eye)"/>
  <circle cx="88" cy="152" r="4.2" fill="#2A0A10"/>
  <circle cx="152" cy="152" r="4.2" fill="#2A0A10"/>

  <!-- nose -->
