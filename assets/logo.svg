  <!-- fanged grin -->
  <path d="M82 188 Q120 214 158 188 Q120 200 82 188 Z" fill="#241640"/>
  <path d="M98 190 L104 206 L110 190 Z" fill="#F3F1F8"/>
  <path d="M142 190 L136 206 L130 190 Z" fill="#F3F1F8"/>
