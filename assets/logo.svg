<svg width="240" height="240" viewBox="0 0 240 240" xmlns="http://www.w3.org/2000/svg" role="img" aria-label="oni">
  <defs>
    <linearGradient id="face" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#9B3BE8"/>
      <stop offset="1" stop-color="#571C9C"/>
    </linearGradient>
    <linearGradient id="horn" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#F3F1F8"/>
      <stop offset="1" stop-color="#C4BFD6"/>
    </linearGradient>
    <radialGradient id="eye" cx="0.5" cy="0.45" r="0.65">
      <stop offset="0" stop-color="#FFE79A"/>
      <stop offset="0.45" stop-color="#F06A2E"/>
      <stop offset="1" stop-color="#8E1414"/>
    </radialGradient>
  </defs>

  <!-- horns -->
  <path d="M86 80 C58 68 44 42 50 18 C68 34 80 42 94 60 C100 68 98 76 86 80 Z"
