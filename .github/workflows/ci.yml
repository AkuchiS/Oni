name: ci
# The suite existed but nothing ever ran it — same gap that let a broken build ship elsewhere.
# Tests are fully offline (bundled fixture repo), so this needs no network and no secrets.
on:
  push:
    branches: [main]
  pull_request:
  workflow_dispatch:

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        python: ["3.8", "3.11", "3.12"]
        exclude:
          - os: macos-latest      # 3.8 isn't available on the arm64 runners
            python: "3.8"
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python }}
      - name: Install (dev extra = pytest; oni itself has no runtime deps)
        run: |
          python -m pip install -U pip
          pip install -e ".[dev]"
      - name: Tests (offline)
        run: pytest -q

  zero-deps:
    # oni's headline claim is "pure stdlib, zero dependencies". Assert it instead of trusting the
    # README — a wheel that quietly grows a dependency would otherwise ship unnoticed.
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with: { python-version: "3.12" }
      - name: Build the wheel
        run: python -m pip install -U pip build && python -m build
      - name: Assert ZERO runtime dependencies
        run: |
          python - <<'PY'
          import glob, zipfile
          whl = glob.glob("dist/*.whl")[0]
          meta = zipfile.ZipFile(whl).read(
              [n for n in zipfile.ZipFile(whl).namelist() if n.endswith("METADATA")][0]).decode()
          reqs = [l for l in meta.splitlines() if l.startswith("Requires-Dist:")]
          assert not reqs, "oni claims zero deps but the wheel requires: %s" % reqs
          print("zero-dep wheel OK:", whl)
          PY
